  text: 'A federal appellate court handed a major win to ICE detainees in litigation
    over the Trump admin''s mass detention policy.


    In a 2-1 ruling, judges said detainees must get a bond hearing in 90 days to be
    given due process rights, noting the vast majority are non-criminals and longtime
    residents.'
