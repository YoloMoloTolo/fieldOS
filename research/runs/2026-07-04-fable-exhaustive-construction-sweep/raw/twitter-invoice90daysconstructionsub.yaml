- id: '2073016555831726378'
  text: "Appeals court blocks Trump admin from holding migrants without bond for over\
    \ 90 days\n\nHere we go again...\U0001F644\n\nICE goes to great lengths to capture\
    \ these criminals, only to have judges interfere with the process over and over\
    \ again. \n\nIf bond is allowed, these criminals will just disappear, making LE\
    \ have to track them down again. \n\nIt's like the movie 'Groundhog Day'.\n\n\
    Hopefully this ruling won't stand as DHS is confident it has the authority to\
    \ hold these illegals.  \n\nFrom the article:\n\nAn appeals court on Thursday\
    \ ruled that U.S. Immigration and Customs Enforcement cannot detain immigrants\
    \ for more than 90 days without giving them an opportunity to seek release on\
    \ bond while their deportation proceedings are pending.\n\nIn a 2-1 ruling, the\
    \ Fifth U.S. Circuit Court of Appeals sided against the administration, potentially\
    \ affecting thousands of immigrants who have been detained by Immigration and\
    \ Customs Enforcement agents in states within the court's jurisdiction, including\
    \ Texas and Louisiana.\n\nJudge Leslie Southwick, writing for the majority, said\
    \ the U.S. Supreme Court found in 2001 that the due process clause protects everyone,\
    \ including two Mexican citizens and one Honduran whose cases were at issue in\
    \ this case.\n\nIn a dissenting opinion, Judge Cory Wilson said the majority \"\
    marginalizes the Constitution's express grant of plenary authority over immigration\
    \ matters to Congress.\"\n\nThe Department of Homeland Security said in a statement\
    \ to the outlet that it disagrees with the ruling, adding that it is \"confident\
    \ in its legal position regarding mandatory detention.\"\n\nLast week, the administration\
    \ had asked the Supreme Court to review a similar ruling by a different appeals\
    \ court.\n\nFederal immigration law states that \"applicants for admission\" ​to\
    \ the country are ​subject to mandatory detention ⁠while their cases proceed in\
    \ immigration courts, making them ineligible for bond hearings.\n\nDespite a long-standing\
    \ interpretation of immigration law, the Department of Homeland Security claimed\
    \ last year that non-citizens who are already in the U.S. qualify as \"applicants\
    \ ​for admission\" subject to mandatory detention, rather than only people arriving\
    \ at the border.\n\nThe Board of Immigration Appeals, which is part of the Justice\
    \ Department, announced in September ​that it had adopted the Department of Homeland\
    \ Security's interpretation.\n\nImmigration judges employed by the ​department\
    \ began ordering mandatory detention across the country.\n\nLink to article in\
    \ comments"
