- id: '2072077734109671794'
  text: 'Met a girl in Austin who owes $200K on credit cards and hasn''t paid a single
    dollar of interest in over 5 years


    Thought she was full of shit


    She pulled up a color-coded Google Sheet and walked me through it. The math actually
    checks out. She might be the most dangerous person in consumer finance or the
    most disciplined. Probably both


    The one fact that makes the whole thing work, steal it right now:


    Business cards don''t report to your personal credit. Chase Ink, Amex Blue Business,
    Capital One Spark, US Bank Triple Cash. None of them post balances to your personal
    file unless you default and they close the account. So you can carry $200K across
    8 business cards and your personal credit report shows 2% utilization. Score stays
    at 758. Banks keep approving her because they can''t see the other balances


    Now her actual cycle:


    She stacks $200K in 0% APR business cards across 6-8 banks. Deploys the capital
    into rental properties and her event planning business. Around month 10, before
    the 0% promo dies, she applies for a fresh round of 0% cards at different banks
    she hasn''t used in 24+ months


    Approved every time. 758 score. Clean personal file. Each bank sees a borrower
    with almost no visible debt


    Then she liquidates the new 0% cards through Trykashu at 6.5% and uses the cash
    to pay off the old cards. The 0% clock resets for another 12 months. Old cards
    drop to $0. New cards carry the $200K. Still $0 in interest


    The yearly cost breakdown she showed me:


    Trykashu liquidation fees per cycle: $13,000 (6.5% on $200K)

    Total annual cost to maintain $200K in perpetual 0% capital: $13,000


    Compare to:


    SBA loan at 11.5% on $200K: $23,000/year in interest

    Business line of credit at 9% on $200K: $18,000/year

    MCA on $200K: $60,000-$120,000/year in fees


    She pays $13K/year. The SBA borrower pays $23K/year. Same money. One of them is
    paying 77% more for the identical capital


    "What if one bank catches on and denies her?"


    She maintains relationships at 11 banks simultaneously. If Amex denies her (it
    happened once in 2024), she shifts to Navy Federal, PNC, and Regions. She keeps
    a running list of which banks she''s applied to, when, and which bureau they pulled.
    The spreadsheet tracks 23 data points per card


    She also keeps $5K-$10K in business checking at every bank she plans to apply
    to. The banking relationship bonus alone increases her approval limits 30-60%
    at each institution. The $50K-$80K sitting across 11 checking accounts is permanent
    bait money that she never touches


    The rental property math on her deployed $200K:


    Property 1 (Cleveland, $68K purchase): rents $1,050/month

    Property 2 (Indianapolis, $74K purchase): rents $1,100/month

    Property 3 (Memphis, $58K purchase): rents $975/month


    Combined monthly rent: $3,125

    Annual rental income: $37,500

    Annual cost of 0% capital: $13,000

    Annual property management (10%): $3,750

    Annual insurance/taxes/maintenance: $8,400

    Net annual cash flow: $12,350


    She makes $12,350/year in free cash flow from properties bought entirely with
    credit card money that costs her $0 in interest. The properties appreciate. The
    rent increases. The capital cost stays flat at $13K/year


    After 5 years: $61,750 in accumulated cash flow plus roughly $45,000-$60,000 in
    property appreciation. Total wealth created from $200K in credit card money: roughly
    $106,000-$122,000. Total interest paid to banks: $0


    She told me something i think about constantly: "the bank designed the 0% promo
    as a trap. they''re betting on my laziness. i turned their trap into my operating
    system. they lose money on me every single cycle and they can''t stop approving
    me because my credit file looks perfect"


    Some banks caught her pattern. Amex denied her in late 2024. So she shifted to
    Navy Federal and US Bank. Capital One still approves her every single time


    5 years. $0 in interest. $200K in perpetual capital. 3 rental properties. I checked
    the math three times. it works lmfaooo


    (i build this exact stack for 700+ scores, $100K-$250K at 0%. if your score isn''t
    there yet i fix it first in 30-90 days. link in bio)'
